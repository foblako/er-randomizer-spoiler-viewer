name: Build and Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: windows-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"

      - name: Install PyInstaller
        run: pip install pyinstaller

      - name: Build .exe
        run: pyinstaller er_spoiler_viewer.spec

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ER-Spoiler-Viewer
          path: "dist/ER Spoiler Viewer.exe"

      - name: Create GitHub Release
        if: startsWith(github.ref, 'refs/tags/')
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: gh release create ${{ github.ref_name }} "dist/ER Spoiler Viewer.exe" --generate-notes --title "ER Spoiler Viewer ${{ github.ref_name }}"
